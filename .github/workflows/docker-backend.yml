name: Docker Backend

on:
  workflow_call:

jobs:
  docker-health:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t orca-api-ci backend/

      - name: Start container
        run: |
          docker run -d --name orca-api \
            --network host \
            -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/postgres \
            -e JWT_SECRET=ci-test-secret \
            orca-api-ci

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/graphql -o /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start"
          docker logs orca-api
          exit 1

      - name: Health check GraphQL query
        run: |
          RESPONSE=$(curl -sf http://localhost:4000/graphql \
            -H 'Content-Type: application/json' \
            -d '{"query":"{ __typename }"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"__typename"' || {
            echo "Health check failed: unexpected response"
            exit 1
          }

      - name: Print container logs
        if: failure()
        run: docker logs orca-api
