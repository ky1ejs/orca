name: Validate Web

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
        working-directory: shared

      - run: bun install
        working-directory: web

      - run: bunx graphql-codegen
        working-directory: web

      - name: Lint
        run: bun run lint
        working-directory: web

      - name: Format check
        run: bun run format:check
        working-directory: web

      - name: Typecheck
        run: bun run typecheck
        working-directory: web

      - name: Test
        run: bun run test
        working-directory: web

      - name: Build
        run: bun run build
        working-directory: web
