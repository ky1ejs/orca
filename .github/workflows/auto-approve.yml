name: Auto-approve admin PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: auto-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Check if author is repo admin
        id: check-permission
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PERMISSION=$(gh api \
            repos/${{ github.repository }}/collaborators/${{ github.event.pull_request.user.login }}/permission \
            --jq '.permission')
          echo "permission=$PERMISSION" >> "$GITHUB_OUTPUT"

      - name: Approve PR
        if: steps.check-permission.outputs.permission == 'admin'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --approve
