name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    outputs:
      web-changed: ${{ steps.check-web.outputs.has-changes || github.event_name == 'push' }}
      backend-changed: ${{ steps.check-backend.outputs.has-changes || github.event_name == 'push' }}
      schema-changed: ${{ steps.check-schema.outputs.has-changes || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check web changes
        if: github.event_name == 'pull_request'
        id: check-web
        uses: ky1ejs/check-diff-paths-action@main
        with:
          paths: '^web/|^shared/'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check backend changes
        if: github.event_name == 'pull_request'
        id: check-backend
        uses: ky1ejs/check-diff-paths-action@main
        with:
          paths: '^backend/|^shared/'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check schema changes
        if: github.event_name == 'pull_request'
        id: check-schema
        uses: ky1ejs/check-diff-paths-action@main
        with:
          paths: '^shared/src/schema\.graphql$'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
      - run: cd shared && bun install

      - name: Lint shared
        run: bunx eslint shared/

      - name: Format check shared
        run: bunx prettier --check "shared/"

      - name: Typecheck shared
        run: bun run typecheck
        working-directory: shared

      - name: Test shared
        run: bun run test
        working-directory: shared

  validate-web:
    needs: checks
    if: needs.checks.outputs.web-changed == 'true'
    uses: ./.github/workflows/validate-web.yml

  validate-backend:
    needs: checks
    if: needs.checks.outputs.backend-changed == 'true'
    uses: ./.github/workflows/validate-backend.yml

  labels:
    needs: checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add web label
        if: needs.checks.outputs.web-changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label "web"

      - name: Add backend label
        if: needs.checks.outputs.backend-changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label "backend"

      - name: Add graphql-schema label
        if: needs.checks.outputs.schema-changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label "graphql-schema"

  status:
    needs: [checks, validate-web, validate-backend, labels]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.checks.result }}" == "failure" || "${{ needs.validate-web.result }}" == "failure" || "${{ needs.validate-backend.result }}" == "failure" || "${{ needs.labels.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed (or were skipped)"
