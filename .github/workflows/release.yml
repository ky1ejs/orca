name: Release

on:
  push:
    branches: [main]
    paths:
      - 'web/**'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: bump
        run: |
          CURRENT=$(node -p "require('./web/package.json').version")
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1 || echo "")

          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="$CURRENT"
          else
            TAGGED_VERSION="${LATEST_TAG#v}"
            if [ "$CURRENT" != "$TAGGED_VERSION" ]; then
              NEW_VERSION="$CURRENT"
            else
              IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
              PATCH=$((PATCH + 1))
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            fi
          fi

          TAG="v$NEW_VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('web/package.json', 'utf8'));
            pkg.version = '${{ needs.version.outputs.version }}';
            fs.writeFileSync('web/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install web dependencies
        run: bun install
        working-directory: web

      - name: Generate GraphQL types
        run: bun run codegen
        working-directory: web

      - name: Build Electron app
        run: bun run build
        working-directory: web

      - name: Import code signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Package, sign, and notarize
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npx electron-builder --mac --${{ matrix.arch }} \
            --config electron-builder.yml \
            --publish never
        working-directory: web

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orca-mac-${{ matrix.arch }}
          path: |
            web/dist-electron/*.dmg
            web/dist-electron/*.zip
            web/dist-electron/latest-mac*.yml

  release:
    needs: [version, build]
    if: ${{ !cancelled() && needs.version.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: orca-mac-*
          path: artifacts
          merge-multiple: true

      - name: Check for artifacts
        id: check
        run: |
          ARTIFACTS=$(find artifacts -name '*.dmg' -o -name '*.zip' 2>/dev/null | head -1)
          if [ -z "$ARTIFACTS" ]; then
            echo "No build artifacts found — all builds failed"
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found artifacts:"
            ls -la artifacts/
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version, tag, and push
        if: steps.check.outputs.has_artifacts == 'true'
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TAG="${{ needs.version.outputs.tag }}"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('web/package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('web/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/package.json
          git diff --cached --quiet || git commit -m "chore: bump version to $VERSION"
          git tag "$TAG"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.check.outputs.has_artifacts == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          gh release create "$TAG" artifacts/* \
            --repo ${{ github.repository }} \
            --title "$TAG" \
            --generate-notes
