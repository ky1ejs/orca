name: Release

on:
  push:
    branches: [main]
    paths:
      - 'web/**'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: bump
        run: |
          CURRENT=$(node -p "require('./web/package.json').version")
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1 || echo "")

          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="$CURRENT"
          else
            TAGGED_VERSION="${LATEST_TAG#v}"
            IS_HIGHER=$(node -e "
              const [a, b] = ['$CURRENT', '$TAGGED_VERSION'].map(v => v.split('.').map(Number));
              console.log(a[0] > b[0] || (a[0] === b[0] && a[1] > b[1]) || (a[0] === b[0] && a[1] === b[1] && a[2] > b[2]) ? 'true' : 'false');
            ")
            if [ "$IS_HIGHER" = "true" ]; then
              NEW_VERSION="$CURRENT"
            else
              IFS='.' read -r MAJOR MINOR PATCH <<< "$TAGGED_VERSION"
              PATCH=$((PATCH + 1))
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            fi
          fi

          TAG="v$NEW_VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  create-release:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push tag
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --draft \
            --generate-notes

  build:
    needs: [version, create-release]
    if: needs.version.outputs.should_release == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('web/package.json', 'utf8'));
            pkg.version = '${{ needs.version.outputs.version }}';
            fs.writeFileSync('web/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install web dependencies
        run: bun install
        working-directory: web

      - name: Generate GraphQL types
        run: bun run codegen
        working-directory: web

      - name: Build Electron app
        run: bun run build
        working-directory: web

      - name: Import code signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Package, sign, and notarize
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npx electron-builder --mac --${{ matrix.arch }} \
            --config electron-builder.yml \
            --publish never
        working-directory: web

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          REPO="${{ github.repository }}"
          ARCH="${{ matrix.arch }}"

          for file in web/dist-electron/*.dmg web/dist-electron/*.zip; do
            [ -f "$file" ] || continue
            echo "Uploading $(basename "$file")..."
            gh release upload "$TAG" "$file" --repo "$REPO" --clobber
          done

          # Upload latest-mac.yml under an arch-specific name to avoid clobber races
          if [ -f "web/dist-electron/latest-mac.yml" ]; then
            cp "web/dist-electron/latest-mac.yml" "web/dist-electron/latest-mac-${ARCH}.yml"
            echo "Uploading latest-mac-${ARCH}.yml..."
            gh release upload "$TAG" "web/dist-electron/latest-mac-${ARCH}.yml" --repo "$REPO" --clobber
          fi

  finalize-release:
    needs: [version, build]
    if: always() && needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check build results
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          REPO="${{ github.repository }}"

          # Check if any assets were uploaded
          ASSET_COUNT=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets | length')
          echo "Assets uploaded: $ASSET_COUNT"

          if [ "$ASSET_COUNT" -gt 0 ]; then
            echo "has_assets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_assets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge architecture manifests
        if: steps.check.outputs.has_assets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          REPO="${{ github.repository }}"

          # Download arch-specific manifests
          gh release download "$TAG" --repo "$REPO" --pattern "latest-mac-arm64.yml" --dir . || true
          gh release download "$TAG" --repo "$REPO" --pattern "latest-mac-x64.yml" --dir . || true

          if [ ! -f "latest-mac-arm64.yml" ] || [ ! -f "latest-mac-x64.yml" ]; then
            echo "Warning: Missing one or both arch manifests, skipping merge"
            # If only one exists, upload it as latest-mac.yml
            for f in latest-mac-arm64.yml latest-mac-x64.yml; do
              if [ -f "$f" ]; then
                cp "$f" latest-mac.yml
                gh release upload "$TAG" latest-mac.yml --repo "$REPO" --clobber
              fi
            done
            exit 0
          fi

          # Merge both manifests into a single latest-mac.yml
          node -e "
            const fs = require('fs');

            function parseYaml(text) {
              const result = { files: [] };
              let currentFile = null;
              for (const line of text.split('\n')) {
                if (line.startsWith('version:')) result.version = line.split(': ')[1].trim();
                else if (line.startsWith('path:')) result.path = line.split(': ')[1].trim();
                else if (line.startsWith('sha512:') && !currentFile) result.sha512 = line.split(': ')[1].trim();
                else if (line.startsWith('releaseDate:')) result.releaseDate = line.replace('releaseDate: ', '').trim();
                else if (line.trim() === '- url:' || line.trim().startsWith('- url: ')) {
                  currentFile = { url: line.trim().replace('- url: ', '') };
                  result.files.push(currentFile);
                } else if (currentFile && line.trim().startsWith('sha512:')) {
                  currentFile.sha512 = line.trim().split(': ')[1];
                } else if (currentFile && line.trim().startsWith('size:')) {
                  currentFile.size = line.trim().split(': ')[1];
                  currentFile = null;
                }
              }
              return result;
            }

            const arm64 = parseYaml(fs.readFileSync('latest-mac-arm64.yml', 'utf8'));
            const x64 = parseYaml(fs.readFileSync('latest-mac-x64.yml', 'utf8'));

            // Use x64 as the base for root-level path/sha512 (backward compat)
            const merged = {
              version: x64.version || arm64.version,
              files: [...arm64.files, ...x64.files],
              path: x64.path || arm64.path,
              sha512: x64.sha512 || arm64.sha512,
              releaseDate: x64.releaseDate || arm64.releaseDate,
            };

            let yml = 'version: ' + merged.version + '\n';
            yml += 'files:\n';
            for (const f of merged.files) {
              yml += '  - url: ' + f.url + '\n';
              yml += '    sha512: ' + f.sha512 + '\n';
              yml += '    size: ' + f.size + '\n';
            }
            yml += 'path: ' + merged.path + '\n';
            yml += 'sha512: ' + merged.sha512 + '\n';
            yml += 'releaseDate: ' + merged.releaseDate + '\n';

            fs.writeFileSync('latest-mac.yml', yml);
            console.log('Merged latest-mac.yml:');
            console.log(yml);
          "

          # Upload merged manifest and clean up arch-specific ones
          gh release upload "$TAG" latest-mac.yml --repo "$REPO" --clobber
          gh release delete-asset "$TAG" latest-mac-arm64.yml --repo "$REPO" --yes || true
          gh release delete-asset "$TAG" latest-mac-x64.yml --repo "$REPO" --yes || true

      - name: Publish release
        if: steps.check.outputs.has_assets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VERSION="${{ needs.version.outputs.version }}"
          REPO="${{ github.repository }}"

          EXISTING_NOTES=$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body')

          NOTES="## Download

          | Platform | Download |
          |----------|----------|
          | macOS (Apple Silicon) | [Orca-${VERSION}-arm64.dmg](https://github.com/${REPO}/releases/download/${TAG}/Orca-${VERSION}-arm64.dmg) |
          | macOS (Intel) | [Orca-${VERSION}.dmg](https://github.com/${REPO}/releases/download/${TAG}/Orca-${VERSION}.dmg) |

          ${EXISTING_NOTES}"

          gh release edit "$TAG" \
            --repo "$REPO" \
            --notes "$NOTES" \
            --draft=false

      - name: Clean up failed release
        if: steps.check.outputs.has_assets == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          REPO="${{ github.repository }}"

          echo "No assets uploaded — deleting draft release and tag"
          gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag
