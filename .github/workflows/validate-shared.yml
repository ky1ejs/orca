name: Validate Shared

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
        working-directory: shared

      - name: Lint
        run: bun run lint
        working-directory: shared

      - name: Format check
        run: bun run format:check
        working-directory: shared

      - name: Typecheck
        run: bun run typecheck
        working-directory: shared

      - name: Test
        run: bun run test
        working-directory: shared
