appId: com.orca.app
productName: Orca
directories:
  buildResources: resources
  output: dist-electron
files:
  - out/**/*
  - resources/**/*
  - '!node_modules/**/{test,tests,__tests__}/**'
  - '!node_modules/**/*.map'
extraMetadata:
  main: out/main/index.js
asar: true
publish:
  provider: github
  owner: ky1ejs
  repo: orca
mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
# Native modules are already rebuilt for Electron by scripts/rebuild-native.mjs
# (runs as part of `bun run setup` / `bun run build`). Skip electron-builder's
# own @electron/rebuild step which uses an old node-gyp incompatible with Python 3.14+.
npmRebuild: false
