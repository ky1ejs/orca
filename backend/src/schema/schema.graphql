type User {
  id: ID!
  email: String!
  name: String!
}

type AuthPayload {
  token: String!
  user: User!
  workspaces: [Workspace!]!
}

type Workspace {
  id: ID!
  name: String!
  slug: String!
  projects: [Project!]!
  createdAt: String!
  updatedAt: String!
}

enum TaskStatus {
  TODO
  IN_PROGRESS
  IN_REVIEW
  DONE
}

type Project {
  id: ID!
  name: String!
  description: String
  workspaceId: ID!
  workspace: Workspace!
  tasks: [Task!]!
  createdAt: String!
  updatedAt: String!
}

type Task {
  id: ID!
  title: String!
  description: String
  status: TaskStatus!
  projectId: ID!
  project: Project!
  workingDirectory: String!
  createdAt: String!
  updatedAt: String!
}

input RegisterInput {
  email: String!
  name: String!
  password: String!
  inviteCode: String!
}

input CreateWorkspaceInput {
  name: String!
  slug: String!
}

input UpdateWorkspaceInput {
  name: String
}

input CreateProjectInput {
  name: String!
  description: String
  workspaceId: ID!
}

input UpdateProjectInput {
  name: String
  description: String
}

input CreateTaskInput {
  title: String!
  description: String
  status: TaskStatus
  projectId: ID!
  workingDirectory: String!
}

input UpdateTaskInput {
  title: String
  description: String
  status: TaskStatus
  workingDirectory: String
}

type Query {
  me: User!
  workspace(slug: String!): Workspace
  workspaces: [Workspace!]!
  project(id: ID!): Project
  task(id: ID!): Task
}

type Mutation {
  login(email: String!, password: String!): AuthPayload!
  register(input: RegisterInput!): AuthPayload!
  createWorkspace(input: CreateWorkspaceInput!): Workspace!
  updateWorkspace(id: ID!, input: UpdateWorkspaceInput!): Workspace!
  deleteWorkspace(id: ID!): Boolean!
  createProject(input: CreateProjectInput!): Project!
  updateProject(id: ID!, input: UpdateProjectInput!): Project!
  deleteProject(id: ID!): Boolean!
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: ID!, input: UpdateTaskInput!): Task!
  deleteTask(id: ID!): Boolean!
}

type Subscription {
  projectChanged(workspaceId: ID!): Project!
  taskChanged(workspaceId: ID!): Task!
}
