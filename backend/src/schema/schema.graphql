scalar DateTime

type User {
  id: ID!
  email: String!
  name: String!
}

type AuthPayload {
  token: String!
  user: User!
  workspaces: [Workspace!]!
  pendingInvitations: [WorkspaceInvitation!]!
}

enum WorkspaceRole {
  OWNER
  MEMBER
}

type WorkspaceMember {
  id: ID!
  user: User!
  role: WorkspaceRole!
  createdAt: DateTime!
}

type WorkspaceInvitation {
  id: ID!
  email: String!
  role: WorkspaceRole!
  workspace: Workspace!
  invitedBy: User!
  expiresAt: DateTime!
  createdAt: DateTime!
}

type GitHubInstallation {
  id: ID!
  installationId: Int!
  accountLogin: String!
  accountType: String!
  repositories: [String!]!
  observedRepositories: [String!]!
  createdAt: DateTime!
}

type WorkspaceSettings {
  id: ID!
  autoCloseOnMerge: Boolean!
  autoInReviewOnPrOpen: Boolean!
  autoCleanupWorktree: Boolean!
}

type Workspace {
  id: ID!
  name: String!
  slug: String!
  role: WorkspaceRole!
  members: [WorkspaceMember!]!
  invitations: [WorkspaceInvitation!]!
  initiatives: [Initiative!]!
  projects: [Project!]!
  tasks(unassociatedOnly: Boolean): [Task!]!
  labels: [Label!]!
  githubInstallation: GitHubInstallation
  settings: WorkspaceSettings!
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum TaskStatus {
  TODO
  IN_PROGRESS
  IN_REVIEW
  DONE
  CANCELLED
}

enum TaskPriority {
  NONE
  LOW
  MEDIUM
  HIGH
  URGENT
}

type Initiative {
  id: ID!
  name: String!
  description: String
  workspaceId: ID!
  workspace: Workspace!
  projects: [Project!]!
  activity(first: Int = 20, after: String): AuditEventConnection!
  archivedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Project {
  id: ID!
  name: String!
  description: String
  defaultDirectory: String
  workspaceId: ID!
  workspace: Workspace!
  initiativeId: ID
  initiative: Initiative
  tasks: [Task!]!
  activity(first: Int = 20, after: String): AuditEventConnection!
  archivedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Label {
  id: ID!
  name: String!
  color: String!
  workspaceId: ID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum PullRequestStatus {
  OPEN
  MERGED
  CLOSED
}

enum CheckStatus {
  PENDING
  IN_PROGRESS
  SUCCESS
  FAILURE
  NEUTRAL
  CANCELLED
  TIMED_OUT
  ACTION_REQUIRED
}

enum ReviewStatus {
  NONE
  APPROVED
  CHANGES_REQUESTED
  COMMENTED
}

type PullRequest {
  id: ID!
  number: Int!
  title: String!
  url: String!
  status: PullRequestStatus!
  reviewStatus: ReviewStatus!
  repository: String!
  headBranch: String!
  author: String!
  draft: Boolean!
  checkStatus: CheckStatus
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum TaskRelationshipType {
  BLOCKS
  RELATES_TO
  DUPLICATES
  CREATED_FROM
}

enum TaskRelationshipDisplayType {
  BLOCKS
  BLOCKED_BY
  RELATES_TO
  DUPLICATES
  DUPLICATED_BY
  CREATED_FROM
  CREATED
}

type TaskRelationship {
  id: ID!
  type: TaskRelationshipType!
  displayType: TaskRelationshipDisplayType!
  relatedTask: Task!
  createdAt: DateTime!
}

type Task {
  id: ID!
  displayId: String!
  title: String!
  description: String
  status: TaskStatus!
  priority: TaskPriority!
  projectId: ID
  project: Project
  assignee: User
  labels: [Label!]!
  pullRequests: [PullRequest!]!
  pullRequestCount: Int!
  relationships: [TaskRelationship!]!
  activity(first: Int = 20, after: String): AuditEventConnection!
  archivedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

input RegisterInput {
  email: String!
  name: String!
  password: String!
  inviteCode: String!
}

input CreateWorkspaceInput {
  name: String!
  slug: String!
}

input UpdateWorkspaceInput {
  name: String
  slug: String
}

input CreateInitiativeInput {
  name: String!
  description: String
  workspaceId: ID!
}

input UpdateInitiativeInput {
  name: String
  description: String
}

input CreateProjectInput {
  name: String!
  description: String
  defaultDirectory: String
  workspaceId: ID!
  initiativeId: ID
}

input UpdateProjectInput {
  name: String
  description: String
  defaultDirectory: String
  initiativeId: ID
}

input CreateTaskInput {
  title: String!
  description: String
  status: TaskStatus
  priority: TaskPriority
  projectId: ID
  workspaceId: ID!
  assigneeId: ID
  labelIds: [ID!]
  sourceTaskId: ID
}

input CreateTaskRelationshipInput {
  sourceTaskId: ID!
  targetTaskId: ID!
  type: TaskRelationshipType!
}

input UpdateTaskInput {
  title: String
  description: String
  status: TaskStatus
  priority: TaskPriority
  projectId: ID
  assigneeId: ID
  labelIds: [ID!]
}

input CreateLabelInput {
  name: String!
  color: String!
  workspaceId: ID!
}

input UpdateLabelInput {
  name: String
  color: String
}

input UpdateWorkspaceSettingsInput {
  autoCloseOnMerge: Boolean
  autoInReviewOnPrOpen: Boolean
  autoCleanupWorktree: Boolean
}

input LinkPullRequestInput {
  taskId: ID!
  url: String!
}

input AddMemberInput {
  workspaceId: ID!
  email: String!
  role: WorkspaceRole
}

input UpdateMemberRoleInput {
  workspaceId: ID!
  userId: ID!
  role: WorkspaceRole!
}

type MemberAdded {
  member: WorkspaceMember!
  message: String!
}

type InvitationCreated {
  invitation: WorkspaceInvitation!
  message: String!
}

union AddMemberResult = MemberAdded | InvitationCreated

enum AuditEntityType {
  TASK
  PROJECT
  INITIATIVE
}

enum AuditAction {
  CREATED
  UPDATED
  ARCHIVED
}

enum AuditActorType {
  USER
  SYSTEM
}

type AuditEventChange {
  field: String!
  oldValue: String
  newValue: String
}

type SystemActor {
  label: String!
}

union AuditActor = User | SystemActor

type AuditEvent {
  id: ID!
  entityType: AuditEntityType!
  entityId: ID!
  action: AuditAction!
  actorType: AuditActorType!
  actor: AuditActor
  changes: [AuditEventChange!]!
  createdAt: DateTime!
}

type AuditEventEdge {
  node: AuditEvent!
  cursor: String!
}

type PageInfo {
  hasNextPage: Boolean!
  endCursor: String
}

type AuditEventConnection {
  edges: [AuditEventEdge!]!
  pageInfo: PageInfo!
}

type Query {
  me: User!
  workspace(slug: String!): Workspace
  workspaces: [Workspace!]!
  initiative(id: ID!): Initiative
  project(id: ID!): Project
  task(id: ID!): Task
  taskByDisplayId(displayId: String!, workspaceId: ID!): Task
  labels(workspaceId: ID!): [Label!]!
  githubAppInstallUrl(workspaceId: ID!): String!
  githubOAuthUrl(workspaceId: ID!): String!
  pendingInvitations: [WorkspaceInvitation!]!
  auditEvents(
    workspaceId: ID!
    entityType: AuditEntityType
    entityId: ID
    first: Int = 20
    after: String
  ): AuditEventConnection!
}

type Mutation {
  login(email: String!, password: String!): AuthPayload!
  register(input: RegisterInput!): AuthPayload!
  createWorkspace(input: CreateWorkspaceInput!): Workspace!
  updateWorkspace(id: ID!, input: UpdateWorkspaceInput!): Workspace!
  deleteWorkspace(id: ID!): Boolean!
  createInitiative(input: CreateInitiativeInput!): Initiative!
  updateInitiative(id: ID!, input: UpdateInitiativeInput!): Initiative!
  archiveInitiative(id: ID!): Initiative!
  createProject(input: CreateProjectInput!): Project!
  updateProject(id: ID!, input: UpdateProjectInput!): Project!
  archiveProject(id: ID!): Project!
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: ID!, input: UpdateTaskInput!): Task!
  archiveTask(id: ID!): Task!
  addMember(input: AddMemberInput!): AddMemberResult!
  removeMember(workspaceId: ID!, userId: ID!): Boolean!
  updateMemberRole(input: UpdateMemberRoleInput!): WorkspaceMember!
  cancelInvitation(id: ID!): Boolean!
  acceptInvitation(id: ID!): Workspace!
  declineInvitation(id: ID!): Boolean!
  completeGitHubInstallation(workspaceId: ID!, installationId: Int!): GitHubInstallation!
  removeGitHubInstallation(workspaceId: ID!): Boolean!
  updateObservedRepositories(workspaceId: ID!, repositories: [String!]!): GitHubInstallation!
  updateWorkspaceSettings(
    workspaceId: ID!
    input: UpdateWorkspaceSettingsInput!
  ): WorkspaceSettings!
  createLabel(input: CreateLabelInput!): Label!
  updateLabel(id: ID!, input: UpdateLabelInput!): Label!
  deleteLabel(id: ID!): Boolean!
  linkPullRequest(input: LinkPullRequestInput!): PullRequest!
  unlinkPullRequest(id: ID!): Boolean!
  createTaskRelationship(input: CreateTaskRelationshipInput!): TaskRelationship!
  removeTaskRelationship(id: ID!): Boolean!
}

type Subscription {
  initiativeChanged(workspaceId: ID!): Initiative!
  projectChanged(workspaceId: ID!): Project!
  taskChanged(workspaceId: ID!): Task!
}
