scalar DateTime

type User {
  id: ID!
  email: String!
  name: String!
}

type AuthPayload {
  token: String!
  user: User!
  workspaces: [Workspace!]!
  pendingInvitations: [WorkspaceInvitation!]!
}

enum WorkspaceRole {
  OWNER
  MEMBER
}

type WorkspaceMember {
  id: ID!
  user: User!
  role: WorkspaceRole!
  createdAt: DateTime!
}

type WorkspaceInvitation {
  id: ID!
  email: String!
  role: WorkspaceRole!
  workspace: Workspace!
  invitedBy: User!
  expiresAt: DateTime!
  createdAt: DateTime!
}

type Workspace {
  id: ID!
  name: String!
  slug: String!
  role: WorkspaceRole!
  members: [WorkspaceMember!]!
  invitations: [WorkspaceInvitation!]!
  projects: [Project!]!
  tasks(unassociatedOnly: Boolean): [Task!]!
  labels: [Label!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum TaskStatus {
  TODO
  IN_PROGRESS
  IN_REVIEW
  DONE
}

enum TaskPriority {
  NONE
  LOW
  MEDIUM
  HIGH
  URGENT
}

type Project {
  id: ID!
  name: String!
  description: String
  defaultDirectory: String
  workspaceId: ID!
  workspace: Workspace!
  tasks: [Task!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Label {
  id: ID!
  name: String!
  color: String!
  workspaceId: ID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Task {
  id: ID!
  displayId: String!
  title: String!
  description: String
  status: TaskStatus!
  priority: TaskPriority!
  projectId: ID
  project: Project
  assignee: User
  labels: [Label!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input RegisterInput {
  email: String!
  name: String!
  password: String!
  inviteCode: String!
}

input CreateWorkspaceInput {
  name: String!
  slug: String!
}

input UpdateWorkspaceInput {
  name: String
  slug: String
}

input CreateProjectInput {
  name: String!
  description: String
  defaultDirectory: String
  workspaceId: ID!
}

input UpdateProjectInput {
  name: String
  description: String
  defaultDirectory: String
}

input CreateTaskInput {
  title: String!
  description: String
  status: TaskStatus
  priority: TaskPriority
  projectId: ID
  workspaceId: ID!
  assigneeId: ID
  labelIds: [ID!]
}

input UpdateTaskInput {
  title: String
  description: String
  status: TaskStatus
  priority: TaskPriority
  projectId: ID
  assigneeId: ID
  labelIds: [ID!]
}

input CreateLabelInput {
  name: String!
  color: String!
  workspaceId: ID!
}

input UpdateLabelInput {
  name: String
  color: String
}

input AddMemberInput {
  workspaceId: ID!
  email: String!
  role: WorkspaceRole
}

input UpdateMemberRoleInput {
  workspaceId: ID!
  userId: ID!
  role: WorkspaceRole!
}

type MemberAdded {
  member: WorkspaceMember!
  message: String!
}

type InvitationCreated {
  invitation: WorkspaceInvitation!
  message: String!
}

union AddMemberResult = MemberAdded | InvitationCreated

type Query {
  me: User!
  workspace(slug: String!): Workspace
  workspaces: [Workspace!]!
  project(id: ID!): Project
  task(id: ID!): Task
  labels(workspaceId: ID!): [Label!]!
  pendingInvitations: [WorkspaceInvitation!]!
}

type Mutation {
  login(email: String!, password: String!): AuthPayload!
  register(input: RegisterInput!): AuthPayload!
  createWorkspace(input: CreateWorkspaceInput!): Workspace!
  updateWorkspace(id: ID!, input: UpdateWorkspaceInput!): Workspace!
  deleteWorkspace(id: ID!): Boolean!
  createProject(input: CreateProjectInput!): Project!
  updateProject(id: ID!, input: UpdateProjectInput!): Project!
  deleteProject(id: ID!): Boolean!
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: ID!, input: UpdateTaskInput!): Task!
  deleteTask(id: ID!): Boolean!
  addMember(input: AddMemberInput!): AddMemberResult!
  removeMember(workspaceId: ID!, userId: ID!): Boolean!
  updateMemberRole(input: UpdateMemberRoleInput!): WorkspaceMember!
  cancelInvitation(id: ID!): Boolean!
  acceptInvitation(id: ID!): Workspace!
  declineInvitation(id: ID!): Boolean!
  createLabel(input: CreateLabelInput!): Label!
  updateLabel(id: ID!, input: UpdateLabelInput!): Label!
  deleteLabel(id: ID!): Boolean!
}

type Subscription {
  projectChanged(workspaceId: ID!): Project!
  taskChanged(workspaceId: ID!): Task!
}
